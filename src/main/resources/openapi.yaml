  # --- Tracking ---
  /v1/tracking/routes:
    get:
      summary: List available routes
      tags: [Tracking]
      description: Returns all configured routes. No authentication required.
      responses:
        '200':
          description: List of routes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/RouteDTO' }

  /v1/tracking/vehicles/{id}/location:
    parameters:
      - name: id
        in: path
        required: true
        description: Vehicle UUID
        schema: { type: string, format: uuid }
    post:
      summary: Update vehicle GPS location
      tags: [Tracking]
      security: [{ bearerAuth: [] }]
      description: |
        Submits a GPS sensor ping for the specified vehicle. The location is snapped to the
        nearest route segment via PostGIS, vehicle status is derived (IN_TRANSIT / IDLE / OFF_ROUTE),
        state is persisted to the location history table, and a delta is broadcast to all connected
        WebSocket clients via `RedisDeltaBroadcaster`.

        **Rate limit:** 60 updates per vehicle per minute. Exceeding this returns `429`.

        **Idempotency:** Supply the `Idempotency-Key` header to deduplicate retries within 24 hours.
        Duplicate requests with the same key return the cached response immediately.

        **Circuit breaker:** PostGIS snapping is guarded by a circuit breaker (threshold: 5 failures).
        When open, returns `503` until the service recovers.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Optional unique key to prevent duplicate processing on retry
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LocationUpdateRequest' }
      responses:
        '200':
          description: Location processed and broadcast
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data: { $ref: '#/components/schemas/LocationUpdateResponse' }
        '400':
          description: Invalid payload (missing required fields, out-of-range coordinates)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '401':
          description: Missing or invalid JWT
        '429':
          description: Rate limit exceeded (60 updates/min per vehicle)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      error:
                        properties:
                          code: { type: string, example: "RATE_LIMIT_EXCEEDED" }
        '503':
          description: PostGIS circuit breaker open — spatial service temporarily unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

