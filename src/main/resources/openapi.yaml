openapi: 3.0.3
info:
  title: Fleet Management API
  description: API for managing a fleet of vehicles, rentals, maintenance, and accounting.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          $ref: '#/components/schemas/ErrorDetail'
        requestId:
          type: string
          example: "req-12345"
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: "VALIDATION_ERROR"
        message:
          type: string
          example: "Invalid input provided"
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    # --- Vehicles Module ---
    VehicleRequest:
      type: object
      required: [make, model, year, licensePlate, vin]
      properties:
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        licensePlate: { type: string }
        vin: { type: string }
    VehicleUpdateRequest:
      type: object
      properties:
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        licensePlate: { type: string }
    VehicleResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        licensePlate: { type: string }
        vin: { type: string }
        state: { type: string, enum: [AVAILABLE, RENTED, MAINTENANCE, RETIRED] }
        odometerKm: { type: integer }
    VehicleStateRequest:
      type: object
      required: [state]
      properties:
        state: { type: string, enum: [AVAILABLE, RENTED, MAINTENANCE, RETIRED] }
    OdometerRequest:
      type: object
      required: [mileageKm]
      properties:
        mileageKm: { type: integer }

    # --- Users Module ---
    UserRegistrationRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        firstName: { type: string }
        lastName: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/UserResponse' }
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        roles: { type: array, items: { type: string } }
    UserUpdateRequest:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
    RoleResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
    AssignRoleRequest:
      type: object
      required: [roleName]
      properties:
        roleName: { type: string }

    # --- Rentals Module ---
    RentalRequest:
      type: object
      required: [vehicleId, customerId, startDate, endDate, estimatedPrice]
      properties:
        vehicleId: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        estimatedPrice: { type: integer }
    RentalResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        vehicleId: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        status: { type: string, enum: [PENDING, ACTIVE, COMPLETED, CANCELLED] }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        actualEndDate: { type: string, format: date-time, nullable: true }
        totalPrice: { type: integer }

    # --- Customers Module ---
    CustomerRequest:
      type: object
      required: [email, firstName, lastName, phone, driversLicense, driverLicenseExpiry]
      properties:
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
        driversLicense: { type: string }
        driverLicenseExpiry: { type: string, format: date, example: "2028-12-31" }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        postalCode: { type: string }
        country: { type: string }
    CustomerResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        phone: { type: string }
        driverLicenseNumber: { type: string }
        licenseExpiryMs: { type: integer, format: int64, description: "License expiry epoch milliseconds" }
        isActive: { type: boolean }
        createdAt: { type: integer, format: int64, description: "Account creation epoch milliseconds" }

    # --- Maintenance Module ---
    MaintenanceRequest:
      type: object
      required: [vehicleId, description, scheduledDate]
      properties:
        vehicleId: { type: string, format: uuid }
        description: { type: string }
        scheduledDate: { type: string, format: date-time }
    MaintenanceResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        jobNumber: { type: string, example: 'MAINT-1741603200000' }
        vehicleId: { type: string, format: uuid }
        status: { type: string, enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED] }
        jobType: { type: string, enum: [ROUTINE, REPAIR, INSPECTION, EMERGENCY] }
        description: { type: string }
        scheduledDate: { type: string, format: date-time }
        startedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        totalCost: { type: number, format: double }
    MaintenanceStatusUpdateRequest:
      type: object
      properties:
        laborCost: { type: integer }
        partsCost: { type: integer }

    # --- Accounting Module ---
    InvoiceRequest:
      type: object
      required: [customerId, rentalId, items, dueDate]
      properties:
        customerId: { type: string, format: uuid }
        rentalId: { type: string, format: uuid }
        dueDate: { type: string, format: date-time }
        items:
          type: array
          items:
            type: object
            required: [description, amount]
            properties:
              description: { type: string }
              amount: { type: integer }
    InvoiceResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoiceNumber: { type: string, example: 'INV-1739632400000' }
        customerId: { type: string, format: uuid }
        rentalId: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [ISSUED, PARTIALLY_PAID, PAID, OVERDUE, CANCELLED] }
        total: { type: integer, description: 'Total in whole PHP units' }
        balance: { type: integer, description: 'Remaining balance in whole PHP units' }
        subtotal: { type: integer }
        tax: { type: integer }
        paidAmount: { type: integer }
        currencyCode: { type: string, example: 'PHP' }
        issueDate: { type: string, format: date-time }
        dueDate: { type: string, format: date-time }
        paidDate: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }
    PaymentRequest:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount: { type: integer }
        paymentMethod: { type: string }
        notes: { type: string }
    PaymentReceiptResponse:
      type: object
      properties:
        paymentId: { type: string, format: uuid }
        invoiceId: { type: string, format: uuid }
        amount: { type: integer }
        paymentDate: { type: string, format: date-time }
        transactionReference: { type: string }
    PaymentResponse:
      type: object
      properties:
        id: { type: string }
        paymentNumber: { type: string }
        amount: { type: integer }
        paymentMethod: { type: string }
        status: { type: string }
        paymentDate: { type: string, format: date-time }
        notes: { type: string, nullable: true }
    AccountRequest:
      type: object
      required: [accountCode, accountName, accountType]
      properties:
        accountCode: { type: string }
        accountName: { type: string }
        accountType: { type: string, enum: [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE] }
        parentAccountId: { type: string, format: uuid, nullable: true }
        description: { type: string, nullable: true }
        isActive: { type: boolean }
    AccountResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        accountCode: { type: string }
        accountName: { type: string }
        accountType: { type: string }
        parentAccountId: { type: string, format: uuid, nullable: true }
        isActive: { type: boolean }
        description: { type: string, nullable: true }
        balance: { type: integer, format: int64 }
    AccountBalanceResponse:
      type: object
      properties:
        account: { type: string }
        balance: { type: integer, format: int64 }
    RevenueReportResponse:
      type: object
      properties:
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        totalRevenue: { type: integer, format: int64 }
        items:
          type: array
          items:
            $ref: '#/components/schemas/RevenueItem'
    RevenueItem:
      type: object
      properties:
        category: { type: string }
        amount: { type: integer, format: int64 }
        description: { type: string }
    BalanceSheetResponse:
      type: object
      properties:
        asOfDate: { type: string, format: date-time }
        assets: { type: array, items: { $ref: '#/components/schemas/AccountBalanceInfo' } }
        liabilities: { type: array, items: { $ref: '#/components/schemas/AccountBalanceInfo' } }
        equity: { type: array, items: { $ref: '#/components/schemas/AccountBalanceInfo' } }
        totalAssets: { type: integer, format: int64 }
        totalLiabilities: { type: integer, format: int64 }
        totalEquity: { type: integer, format: int64 }
        isBalanced: { type: boolean }
    AccountBalanceInfo:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        balance: { type: integer, format: int64 }
    PaymentMethodRequest:
      type: object
      required: [code, displayName, targetAccountCode]
      properties:
        code: { type: string }
        displayName: { type: string }
        targetAccountCode: { type: string }
        isActive: { type: boolean }
        description: { type: string }
    PaymentMethodResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        displayName: { type: string }
        isActive: { type: boolean }

    # --- Tracking Module ---
    LocationUpdateRequest:
      type: object
      required: [latitude, longitude]
      properties:
        latitude: { type: number, format: double, example: 14.5995 }
        longitude: { type: number, format: double, example: 121.0244 }
        routeId: { type: string, format: uuid, nullable: true }
        speed: { type: number, format: double, nullable: true, example: 45.5 }
        heading:
          type: number
          format: double
          nullable: true
          example: 180.0
          description: "Bearing in degrees (0–360)"
        accuracy:
          type: number
          format: double
          nullable: true
          example: 5.0
          description: "GPS accuracy radius in meters"
    LocationUpdateResponse:
      type: object
      properties:
        message: { type: string, example: "Location update processed successfully" }
        vehicleId: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        progress:
          type: string
          example: "42.00%"
          description: "Vehicle progress along its route as a percentage string"
    VehicleRouteLocation:
      type: object
      properties:
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
    VehicleStateResponse:
      type: object
      properties:
        vehicleId: { type: string, format: uuid }
        routeId: { type: string, format: uuid, nullable: true }
        progress: { type: number, format: double, example: 0.42, description: "Route progress [0.0–1.0]" }
        segmentId: { type: string, nullable: true }
        speed: { type: number, format: double, example: 45.5 }
        heading: { type: number, format: double, example: 180.0 }
        status: { type: string, enum: [IN_TRANSIT, IDLE, OFF_ROUTE] }
        distanceFromRoute: { type: number, format: double, example: 8.5, description: "Meters from nearest route segment" }
        location: { $ref: '#/components/schemas/VehicleRouteLocation' }
        timestamp: { type: string, format: date-time }
    VehicleStatusSummary:
      type: object
      properties:
        vehicleId: { type: string, format: uuid }
        routeId: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [IN_TRANSIT, IDLE, OFF_ROUTE] }
        speed: { type: number, format: double }
        progress: { type: number, format: double }
        distanceFromRoute: { type: number, format: double }
        timestamp: { type: string, format: date-time }
    FleetStatusResponse:
      type: object
      properties:
        totalVehicles: { type: integer, example: 8 }
        activeVehicles: { type: integer, example: 3 }
        vehicles:
          type: array
          items: { $ref: '#/components/schemas/VehicleStatusSummary' }
    TrackingRecordLocation:
      type: object
      properties:
        lat: { type: number, format: double }
        lng: { type: number, format: double }
    TrackingRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        progress: { type: number, format: double, description: "Route progress [0.0–1.0]" }
        speed: { type: number, format: double }
        heading: { type: number, format: double, nullable: true }
        status: { type: string, enum: [IN_TRANSIT, IDLE, OFF_ROUTE] }
        distanceFromRoute: { type: number, format: double }
        location: { $ref: '#/components/schemas/TrackingRecordLocation' }
        timestamp: { type: string, format: date-time }
    TrackingHistoryResponse:
      type: object
      properties:
        vehicleId: { type: string, format: uuid }
        totalRecords: { type: integer }
        records:
          type: array
          items: { $ref: '#/components/schemas/TrackingRecord' }
    VehicleStateDelta:
      type: object
      description: "WebSocket push message. Always contains vehicleId and timestamp. All other fields are omitted when unchanged (delta encoding)."
      required: [vehicleId, timestamp]
      properties:
        vehicleId: { type: string, format: uuid }
        progress: { type: number, format: double, nullable: true, description: "Route progress [0.0–1.0]; null if unchanged" }
        bearing: { type: number, format: double, nullable: true, description: "Direction of travel in degrees (0–360); null if unchanged" }
        status: { type: string, enum: [IN_TRANSIT, IDLE, OFF_ROUTE], nullable: true, description: "null if unchanged" }
        distanceFromRoute: { type: number, format: double, nullable: true, description: "Meters from route; null if unchanged" }
        timestamp: { type: string, format: date-time }
    RouteDTO:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        distance: { type: number, format: double, description: "Total route length in meters" }
        waypoints:
          type: array
          items: { $ref: '#/components/schemas/VehicleRouteLocation' }

paths:
  # --- Authentication & Users ---
  /v1/auth/verify:
    get:
      summary: Verify email token
      tags: [Authentication]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Verified
        '400':
          description: Invalid token

  /v1/users/register:
    post:
      summary: Register new user
      tags: [Authentication]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserRegistrationRequest' }
      responses:
        '201':
          description: Created

  /v1/users/login:
    post:
      summary: User login
      tags: [Authentication]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data: { $ref: '#/components/schemas/LoginResponse' }

  /v1/users:
    get:
      summary: List users
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
  /v1/users/roles:
    get:
      summary: List all available roles
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/RoleResponse' } }

  /v1/users/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      summary: Get user profile
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
    patch:
      summary: Update user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdateRequest' }
      responses:
        '200':
          description: Ok
    delete:
      summary: Delete user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Deleted
    post:
      summary: Assign role to user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignRoleRequest' }
      responses:
        '200':
          description: Role assigned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data: { $ref: '#/components/schemas/UserResponse' }

  # --- Vehicles ---
  /v1/vehicles:
    get:
      summary: List vehicles
      tags: [Vehicles]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
    post:
      summary: Register vehicle
      tags: [Vehicles]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VehicleRequest' }
      responses:
        '201':
          description: Created

  /v1/vehicles/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      summary: Get vehicle
      tags: [Vehicles]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
    patch:
      summary: Update vehicle
      tags: [Vehicles]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VehicleUpdateRequest' }
      responses:
        '200':
          description: Ok
    delete:
      summary: Delete vehicle
      tags: [Vehicles]
      security: [{ bearerAuth: [] }]
      responses:
        '204':
          description: Deleted

  /v1/vehicles/{id}/state:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    patch:
      summary: Update vehicle state
      tags: [Vehicles]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VehicleStateRequest' }
      responses:
        '200':
          description: Ok

  /v1/vehicles/{id}/odometer:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    post:
      summary: Record odometer reading
      tags: [Vehicles]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OdometerRequest' }
      responses:
        '200':
          description: Ok

  # --- Rentals ---
  /v1/rentals:
    get:
      summary: List rentals
      tags: [Rentals]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
    post:
      summary: Create rental
      tags: [Rentals]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RentalRequest' }
      responses:
        '201':
          description: Created

  /v1/rentals/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      summary: Get rental
      tags: [Rentals]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok

  /v1/rentals/{id}/activate:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    post:
      summary: Activate rental
      tags: [Rentals]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok

  /v1/rentals/{id}/complete:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    post:
      summary: Complete rental
      tags: [Rentals]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                finalMileage: { type: integer }
      responses:
        '200':
          description: Ok

  /v1/rentals/{id}/cancel:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    post:
      summary: Cancel rental
      tags: [Rentals]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok

  # --- Customers ---
  /v1/customers:
    get:
      summary: List all customers
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/CustomerResponse' } }
    post:
      summary: Create customer
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerRequest' }
      responses:
        '201':
          description: Created

  /v1/customers/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      summary: Get customer detail
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data: { $ref: '#/components/schemas/CustomerResponse' }
        '404':
          description: Customer not found

  /v1/customers/{id}/deactivate:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    patch:
      summary: Toggle customer active status
      description: Flips the `isActive` flag on the customer record (deactivate if active, reactivate if inactive).
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Updated customer record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data: { $ref: '#/components/schemas/CustomerResponse' }
        '404':
          description: Customer not found

  # --- Maintenance ---
  /v1/maintenance:
    get:
      summary: List all maintenance jobs
      tags: [Maintenance]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
