  /v1/fleet/live:
    get:
      summary: Live fleet WebSocket stream
      tags: [Tracking]
      security: [{ bearerAuth: [] }]
      x-websocket: true
      description: |
        **WebSocket endpoint** — upgrade via `ws://host/v1/fleet/live`.
        Authenticate by sending the `Authorization: Bearer <JWT>` header on the upgrade request.

        ### Connection lifecycle
        1. On connect, the server sends `initial_state` frames for all vehicles that have a
           cached route state in Redis.
        2. Thereafter, `VehicleStateDelta` frames are pushed whenever a vehicle's state changes
           following a successful `POST /v1/tracking/vehicles/{id}/location` call.
        3. Frames use **delta encoding**: only fields that changed since the last broadcast are
           populated. `vehicleId` and `timestamp` are always present.
        4. If state is unchanged (identical ping), no frame is sent.

        ### Message shape
        ```json
        {
          "vehicleId": "c9352986-639a-4841-bed9-9ff99f2e3349",
          "progress": 0.45,
          "bearing": 180.0,
          "status": "IN_TRANSIT",
          "distanceFromRoute": 8.5,
          "timestamp": "2026-03-07T14:32:22Z"
        }
        ```
        See `VehicleStateDelta` schema for the full field reference.

        > **Note:** OpenAPI 3.0 does not natively model WebSocket channels.
        > This entry documents the upgrade path and message contract only.
      responses:
        '101':
          description: Switching Protocols — WebSocket connection established
        '401':
          description: Unauthorized — JWT missing or invalid
